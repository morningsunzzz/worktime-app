imageRegistry: ghcr.io/morningsunzzz
imagePullSecrets:
  - name: ghcr-secret

backend:
  replicaCount: 1
  image: ghcr.io/morningsunzzz/worktime-backend:20260527
  imagePullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8000
  env:
    DATABASE_URL: postgresql://worktime:worktime123@43.155.140.124:5432/worktime
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

frontend:
  replicaCount: 1
  image: ghcr.io/morningsunzzz/worktime-frontend:20260527
  imagePullPolicy: IfNotPresent
  service:
    type: NodePort
    nodePort: 30080
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

ingress:
  enabled: false
  className: nginx
  host: worktime.example.com
